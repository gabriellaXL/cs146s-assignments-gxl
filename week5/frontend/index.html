<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modern Software Dev Starter</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Modern Software Dev Starter</h1>

      <section>
        <h2>Notes</h2>
        <form id="note-form">
          <input id="note-title" placeholder="Title" required />
          <input id="note-content" placeholder="Content" required />
          <button type="submit">Add</button>
        </form>
        <ul id="notes"></ul>
      </section>

      <section>
        <h2>Action Items</h2>
        <form id="action-form">
          <input id="action-desc" placeholder="Description" required />
          <button type="submit">Add</button>
        </form>

        <!-- Filter toolbar -->
        <div class="filter-bar" role="group" aria-label="Filter action items">
          <button class="active" data-filter="all">All</button>
          <button data-filter="false">Open</button>
          <button data-filter="true">Done</button>
        </div>

        <!-- Bulk action row -->
        <div class="bulk-bar">
          <span id="selected-count">0 selected</span>
          <button id="bulk-complete-btn" disabled>Mark Selected Done</button>
        </div>

        <ul id="actions"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
