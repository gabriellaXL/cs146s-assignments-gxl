<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Modern Software Dev Starter</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main>
      <h1>Modern Software Dev Starter</h1>

      <section>
        <h2>Notes</h2>
        <p id="note-feedback" class="feedback" aria-live="polite"></p>
        <div id="note-search">
          <input id="search-input" placeholder="Search notes..." />
          <button id="search-btn" type="button">Search</button>
          <button id="search-clear" type="button">Clear</button>
        </div>
        <form id="note-form">
          <input id="note-id" type="hidden" />
          <input id="note-title" placeholder="Title" required />
          <input id="note-content" placeholder="Content" required />
          <button id="note-submit" type="submit">Add</button>
          <button id="note-cancel" type="button" hidden>Cancel</button>
        </form>
        <ul id="notes"></ul>
      </section>

      <section>
        <h2>Action Items</h2>
        <p id="action-feedback" class="feedback" aria-live="polite"></p>
        <form id="action-form">
          <input id="action-desc" placeholder="Description" required />
          <button type="submit">Add</button>
        </form>
        <ul id="actions"></ul>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
